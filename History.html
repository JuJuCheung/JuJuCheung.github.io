<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life of Soldiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
    }

    header {
      background: #2f3b2f;
      color: white;
      padding: 40px;
      text-align: center;
    }

    nav {
      background: #1e261e;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      text-align: center;
      color: #2f3b2f;
    }

    .quiz-wrapper {
      background: #f3f4f7;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .answer-btn {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .correct { background: green; }
    .wrong { background: crimson; }

    .next-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .score {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Life of Soldiers</h1>
  <p>Explore the struggles, courage, and sacrifices of soldiers.</p>
</header>

<nav>
  <a href="#quiz">Quiz</a>
</nav>

<section id="quiz">
  <h2>Harder Soldier Quiz</h2>

  <div class="quiz-wrapper">
    <div id="quiz-container">
      <div id="question"></div>
      <div class="answers" id="answers"></div>
      <p id="statusText">Choose one answer.</p>
      <button class="next-btn" id="nextBtn">Next</button>
      <div class="score">Score: <span id="score">0 / 10</span></div>
    </div>
  </div>
</section>

<script>
const quizData = [
  {
    question: "1. Why was training essential for soldiers?",
    answers: [
      "A. Entertainment",
      "B. Discipline, strength, teamwork",
      "C. Avoiding war",
      "D. Free time"
    ],
    correct: 1
  },
  {
    question: "2. What impact did limited food have?",
    answers: [
      "A. Made them stronger",
      "B. No effect",
      "C. Reduced energy & morale",
      "D. Improved diet"
    ],
    correct: 2
  },
  {
    question: "3. Why were trenches dangerous?",
    answers: [
      "A. Too comfortable",
      "B. Disease, mud, enemy fire",
      "C. Too much food",
      "D. Used for rest"
    ],
    correct: 1
  },
  {
    question: "4. What emotional struggle was common?",
    answers: [
      "A. Happiness",
      "B. Homesickness",
      "C. No emotions",
      "D. Excitement"
    ],
    correct: 1
  },
  {
    question: "5. Why were letters important?",
    answers: [
      "A. Emotional support",
      "B. Orders",
      "C. Maps",
      "D. Food"
    ],
    correct: 0
  },
  {
    question: "6. Why is teamwork important?",
    answers: [
      "A. No reason",
      "B. Slows soldiers",
      "C. Helps survival",
      "D. Reduces discipline"
    ],
    correct: 2
  },
  {
    question: "7. What does endurance mean?",
    answers: [
      "A. Giving up",
      "B. Avoiding work",
      "C. Surviving hardship",
      "D. Comfort"
    ],
    correct: 2
  },
  {
    question: "8. How did modern tech affect soldiers?",
    answers: [
      "A. Removed danger",
      "B. No training needed",
      "C. Advanced weapons/tools",
      "D. Reduced teamwork"
    ],
    correct: 2
  },
  {
    question: "9. Why are friendships important?",
    answers: [
      "A. Avoid work",
      "B. Compete",
      "C. Support each other",
      "D. Replace training"
    ],
    correct: 2
  },
  {
    question: "10. What describes soldier life best?",
    answers: [
      "A. Easy",
      "B. Luxury",
      "C. Sacrifice & challenge",
      "D. Entertainment"
    ],
    correct: 2
  }
];

let currentQuestion = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const statusText = document.getElementById("statusText");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const quizContainer = document.getElementById("quiz-container");

function loadQuestion() {
  const q = quizData[currentQuestion];
  questionEl.textContent = q.question;
  answersEl.innerHTML = "";
  answered = false;

  q.answers.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.textContent = answer;
    btn.classList.add("answer-btn");
    btn.onclick = () => selectAnswer(index);
    answersEl.appendChild(btn);
  });
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const correctIndex = quizData[currentQuestion].correct;
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIndex) btn.classList.add("correct");
    if (i === index && i !== correctIndex) btn.classList.add("wrong");
  });

  if (index === correctIndex) score++;
  scoreEl.textContent = score + " / 10";
}

nextBtn.onclick = () => {
  if (!answered) return;

  currentQuestion++;
  if (currentQuestion < quizData.length) {
    loadQuestion();
  } else {
    quizContainer.innerHTML = `<h2>Final Score: ${score}/10</h2>`;
  }
};

loadQuestion();
</script>

</body>
</html>
