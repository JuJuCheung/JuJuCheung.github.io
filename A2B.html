<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2B Subject</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      background: #f4f1ea;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
      url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
      height: 60vh;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-text { max-width: 800px; padding: 20px; }
    .hero-text h1 { font-size: 3rem; margin-bottom: 10px; }
    .hero-text p { font-size: 1.2rem; }

    nav {
      background: #2f3b2f;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover { color: #d4b483; }

    section {
      padding: 50px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2f3b2f;
      font-size: 2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .timeline {
      border-left: 4px solid #7a4e2d;
      padding-left: 20px;
    }

    .quote {
      background: #2f3b2f;
      color: white;
      padding: 40px;
      text-align: center;
      border-radius: 10px;
      margin-top: 30px;
    }

    .quiz-wrapper {
      max-width: 650px;
      margin: 20px auto;
      background: #f3f4f7;
      padding: 18px;
      border-radius: 12px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .answer-btn {
      background: #0b0b0b;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
    }

    .answer-btn.correct { background: green; }
    .answer-btn.wrong { background: crimson; }

    .next-btn {
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .achievement {
      margin-top: 15px;
      padding: 16px;
      border-radius: 12px;
      background: #fff4cc;
      border: 2px solid #d4b483;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <div class="hero-text">
    <h1>A2B Subject</h1>
    <p>Exploring online safety and digital responsibility.</p>
  </div>
</header>

<section id="quiz">
  <h2>A2B Quiz</h2>

  <div class="quiz-wrapper">
    <div id="quiz-container">
      <div id="question"></div>
      <div class="answers" id="answers"></div>
      <p id="statusText">Choose one answer.</p>
      <button class="next-btn" id="nextBtn">Next Question</button>
      <div>Score: <span id="score">0 / 10</span></div>
    </div>
  </div>
</section>

<script>
const quizData = [
  {
    question: "1. Why is keeping your password private important?",
    answers: ["A. It protects your account from being accessed by others", "B. It makes your computer faster", "C. It helps websites look better", "D. It makes games easier"],
    correct: 0
  },
  {
    question: "2. Which password is the safest choice?",
    answers: ["A. password123", "B. 123456", "C. BlueTiger!47", "D. yourname"],
    correct: 2
  },
  {
    question: "3. What should you do if a stranger online asks where you live?",
    answers: ["A. Tell them your address", "B. Block/report them and tell a trusted adult", "C. Ask where they live first", "D. Send a photo instead"],
    correct: 1
  },
  {
    question: "4. Why should you be careful with personal information online?",
    answers: ["A. It can be copied or misused", "B. It disappears immediately", "C. Only friends see it", "D. It improves security"],
    correct: 0
  },
  {
    question: "5. What is the safest action before clicking a link?",
    answers: ["A. Click quickly", "B. Check if it’s from a trusted source", "C. Share it", "D. Ignore all links"],
    correct: 1
  },
  {
    question: "6. Which is cyberbullying?",
    answers: ["A. Helping online", "B. Sending hurtful messages repeatedly", "C. Homework search", "D. Playing games"],
    correct: 1
  },
  {
    question: "7. Best response to bullying?",
    answers: ["A. Reply back", "B. Block/report and tell an adult", "C. Share publicly", "D. Ignore forever"],
    correct: 1
  },
  {
    question: "8. How check info is reliable?",
    answers: ["A. Likes", "B. First result", "C. Check sources and compare", "D. Pictures"],
    correct: 2
  },
  {
    question: "9. Why think before posting?",
    answers: ["A. Posts stay online", "B. Disappear fast", "C. Private always", "D. Only friends see"],
    correct: 0
  },
  {
    question: "10. Unsafe situation?",
    answers: ["A. Keep secret", "B. Investigate", "C. Tell trusted adult", "D. Share it"],
    correct: 2
  }
];

let currentQuestion = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const quizContainer = document.getElementById("quiz-container");

function loadQuestion() {
  const q = quizData[currentQuestion];
  questionEl.textContent = q.question;
  answersEl.innerHTML = "";
  answered = false;

  q.answers.forEach((a,i)=>{
    const btn=document.createElement("button");
    btn.textContent=a;
    btn.classList.add("answer-btn");
    btn.onclick=()=>selectAnswer(i);
    answersEl.appendChild(btn);
  });
}

function selectAnswer(i){
  if(answered) return;
  answered=true;

  const correct=quizData[currentQuestion].correct;
  const buttons=document.querySelectorAll(".answer-btn");

  buttons.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===correct) b.classList.add("correct");
    if(idx===i && i!==correct) b.classList.add("wrong");
  });

  if(i===correct) score++;
  scoreEl.textContent=score+" / 10";
}

nextBtn.onclick=()=>{
  if(!answered) return;

  currentQuestion++;
  if(currentQuestion<quizData.length) loadQuestion();
  else showResult();
};

function showResult(){
  if(score===10){
    quizContainer.innerHTML=`
      <h2>Quiz Complete</h2>
      <p>${score}/10</p>
      <div class="achievement">🏆 Achievement Unlocked: A2B Teacher</div>
      <button onclick="location.reload()">Restart</button>
    `;
  } else {
    quizContainer.innerHTML=`
      <h2>Quiz Complete</h2>
      <p>${score}/10</p>
      <button onclick="location.reload()">Restart</button>
    `;
  }
}

loadQuestion();
</script>

</body>
</html>
