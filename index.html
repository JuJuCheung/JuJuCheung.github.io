<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philippe Starck</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
    }

    .hero {
      height: 100vh;
      background: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1500&q=80") no-repeat center center/cover;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero-text h1 {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .hero-text .subtitle {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }

    .hero-text .name {
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      .hero-text h1 {
        font-size: 2.5rem;
      }

      .hero-text .subtitle {
        font-size: 1.2rem;
      }

      .hero-text .name {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="overlay">
      <div class="hero-text">
        <h1>Philippe Starck</h1>
        <p class="subtitle">GCSE Design & Technology | Famous Designers Project</p>
        <p class="name">By Juju</p>
      </div>
    </div>
  </section>

</body>
</html>
